name: yadati
description: عيادتي - Pediatric Clinic Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.3

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Charts
  fl_chart: ^0.70.2

  # PDF & Printing
  pdf: ^3.11.3
  printing: ^5.14.2

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.3.4
  just_audio: ^0.9.43
  record: ^5.2.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.9.3

  # UI & Animations
  flutter_animate: ^4.5.2
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  permission_handler: ^11.4.0
  open_filex: ^4.6.0
  timeago: ^3.7.0
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  mockito: ^5.4.5
  build_runner: ^2.4.14
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
